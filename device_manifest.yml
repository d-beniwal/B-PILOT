# Device manifest for the plan-runner GUI (STATIC — no hardware, no imports).
#
# Shape:  beamlines: <beamline>: <category>: [device names]
#
# Plan docstrings reference a category via `device{<category>}` /
# `device_list{<category>}` (see gui_qt/plan_parser.py grammar).  The GUI shows
# that category's names in a dropdown / multi-select and emits the chosen names
# UNQUOTED into the command (expose(det=pg6, scalers=[tc32E])).
#
# Keep names in sync with instrument/devices/<beamline>_devices/*.py __all__
# lists.  This file is the one place to edit when devices change; it can later
# be auto-generated (AST-scan of the device modules' __all__) or replaced by a
# live queueserver `devices_allowed` dump — see gui_qt/device_source.py.

beamlines:

  # 20-ID-E (HEXM) — names from instrument/devices/s20ide_devices/*.py __all__
  20ide:
    area_detector: [pimega, s20varex2, pg6, gh2]
    scaler: [tc32E, doorsE, tamm1E, tamm2E, tamm3E, labjackE, jewellE, hvacE]
    slit: [slitEus, slitEds, txm_slit1, txm_slit2]
    shutter: [fsE]
    motor:
      - samE
      - tomoE
      - attenE
      - nfE
      - saxsE
      - d2E
      - d3E
      - d4_1E
      - d4_2E
      - txmE
      - txm_lensE
      - txm_cam
      - sic1E
      - sic2E
      - ic1E
      - ic2E
      - lens1E
      - lens2E
      - lens3E
      - lens4E
      - zondaSMS
      - zondaD2
      - zondaNF
      - hlsms
      - hlsmstbl
    # semantic group used by scan plans that take a sample-manipulation stage
    sample_stage: [samE, tomoE, zondaSMS]

  # Placeholders for the other MPE beamlines — fill from their device __all__
  # lists as we extend the GUI beyond the test plan.
  1ide:
    area_detector: []
    scaler: []
    motor: []
    slit: []
    shutter: []
  20idd:
    area_detector: []
    scaler: []
    motor: []
    slit: []
    shutter: []
